# ===================================================================
# Kubernetes Deployment - Employee Management System
# ===================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-management-system
  labels:
    app: employee-management-system
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: employee-management-system
  template:
    metadata:
      labels:
        app: employee-management-system
        version: "1.0.0"
    spec:
      containers:
        - name: employee-management-system
          # Replace with actual ECR image URI after pipeline setup
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/employee-management-system:1.0.0
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ems-db-secret
                  key: url
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ems-db-secret
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ems-db-secret
                  key: password
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
