# ===================================================================
# Kubernetes Service - Employee Management System
# ===================================================================
apiVersion: v1
kind: Service
metadata:
  name: employee-management-system
  labels:
    app: employee-management-system
spec:
  type: LoadBalancer
  selector:
    app: employee-management-system
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      name: http
