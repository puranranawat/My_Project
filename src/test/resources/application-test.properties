# =============================================================================
# Test Profile Configuration - H2 In-Memory Database
# =============================================================================
# This profile is activated for integration tests via @ActiveProfiles("test").
# It replaces the MySQL datasource with an H2 in-memory database so tests
# can run without an external database server.

# H2 In-Memory Datasource
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable open-in-view for tests
spring.jpa.open-in-view=false

# Logging (minimal for test speed)
logging.level.com.devsecops.ems=WARN
logging.level.org.hibernate.SQL=WARN
