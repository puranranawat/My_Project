# ===================================================================
# Production Profile Configuration - MySQL Database
# ===================================================================

# MySQL Database (configured via environment variables)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/ems_db}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Logging
logging.level.com.devsecops.ems=INFO
logging.level.org.hibernate.SQL=WARN

# Actuator (expose health for Kubernetes probes)
management.endpoint.health.show-details=always
