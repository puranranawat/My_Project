# ===================================================================
# SonarQube Configuration - Employee Management System
# ===================================================================

sonar.projectKey=employee-management-system
sonar.projectName=Employee Management System
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=src/main/java
sonar.tests=src/test/java

# Java version
sonar.java.source=21

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage report paths (JaCoCo)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Exclusions (generated code, config classes, DTOs)
sonar.exclusions=\
  **/EmsApplication.java,\
  **/config/**,\
  **/dto/**,\
  **/entity/**

# Test exclusions
sonar.test.exclusions=\
  **/test/**
